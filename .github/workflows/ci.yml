name: CI

on:
 pull_request:
  paths-ignore:
   - 'docs/**'
   - '**.md'
   - 'memory/**'
 push:
  branches: [main]
  paths-ignore:
   - 'docs/**'
   - '**.md'
   - 'memory/**'

jobs:
 test:
  runs-on: ubuntu-latest

  services:
   postgres:
    image: postgres:17
    env:
     POSTGRES_DB: training_test
     POSTGRES_USER: training
     POSTGRES_PASSWORD: training_test
    ports:
     - 5432:5432
    options: >-
     --health-cmd pg_isready
     --health-interval 10s
     --health-timeout 5s
     --health-retries 5
   redis:
    image: redis:7
    ports:
     - 6379:6379

  steps:
   - uses: actions/checkout@v4

   - uses: actions/setup-python@v5
     with:
      python-version: "3.12"

   - name: Install dependencies
     run: pip install -r requirements.txt -r requirements-dev.txt

   - name: Setup database
     run: python setup_db.py && flask db stamp head
     env:
      DATABASE_URL: postgresql://training:training_test@localhost:5432/training_test
      FLASK_ENV: testing

   - name: Run unit tests
     run: pytest tests/ -v --ignore=tests/e2e

   - name: Install Playwright
     run: playwright install --with-deps chromium

   - name: Run E2E tests
     run: pytest tests/e2e/ -v
     env:
      DATABASE_URL: postgresql://training:training_test@localhost:5432/training_test
      FLASK_ENV: testing
