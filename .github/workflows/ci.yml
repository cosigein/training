name: CI

on:
 pull_request:
  paths-ignore:
   - 'docs/**'
   - '**.md'
   - 'memory/**'
 push:
  branches: [main]
  paths-ignore:
   - 'docs/**'
   - '**.md'
   - 'memory/**'

jobs:
 test:
  runs-on: ubuntu-latest

  env:
   # TestingConfig (app/config.py) lee DATABASE_URL_TEST. Sin esto los tests caen
   # al default `postgresql://localhost/doback_test` y revientan con
   # "fe_sendauth: no password supplied".
   DATABASE_URL: postgresql://training:training_test@localhost:5432/training_test
   DATABASE_URL_TEST: postgresql://training:training_test@localhost:5432/training_test
   REDIS_URL: redis://localhost:6379/0
   FLASK_ENV: testing
   FLASK_APP: wsgi.py

  services:
   postgres:
    image: postgres:17
    env:
     POSTGRES_DB: training_test
     POSTGRES_USER: training
     POSTGRES_PASSWORD: training_test
    ports:
     - 5432:5432
    options: >-
     --health-cmd pg_isready
     --health-interval 10s
     --health-timeout 5s
     --health-retries 5
   redis:
    image: redis:7
    ports:
     - 6379:6379

  steps:
   - uses: actions/checkout@v4

   - uses: actions/setup-python@v5
     with:
      python-version: "3.12"

   - name: Install dependencies
     run: pip install -r requirements.txt -r requirements-dev.txt

   - name: Setup database
     run: python setup_db.py && flask db stamp head

   - name: Run unit tests
     run: pytest tests/ -v --ignore=tests/e2e

   # tests/e2e/ todavía no existe (Joel lo va a crear). Skipear si no hay tests.
   - name: Check for E2E tests
     id: e2e_check
     run: |
      if [ -d tests/e2e ] && [ -n "$(ls -A tests/e2e 2>/dev/null)" ]; then
        echo "exists=true" >> "$GITHUB_OUTPUT"
      else
        echo "exists=false" >> "$GITHUB_OUTPUT"
        echo "::notice::tests/e2e/ no existe o está vacío — saltando E2E."
      fi

   - name: Install Playwright
     if: steps.e2e_check.outputs.exists == 'true'
     run: playwright install --with-deps chromium

   - name: Run E2E tests
     if: steps.e2e_check.outputs.exists == 'true'
     run: pytest tests/e2e/ -v
