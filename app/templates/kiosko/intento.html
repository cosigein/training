<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>{{ ruta.label if ruta else attempt_id }} — {{ candidato.nombre }}</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/tokens.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/reset.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/kiosko.css') }}">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" crossorigin>
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='6' fill='%230d47a1'/%3E%3Ctext x='50%25' y='50%25' dominant-baseline='central' text-anchor='middle' font-family='system-ui,sans-serif' font-size='13' font-weight='700' fill='white'%3ECM%3C/text%3E%3C/svg%3E">
    <script src="https://unpkg.com/@phosphor-icons/web" defer></script>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" defer></script>
</head>
<body class="ksk-intento-body">

<!-- ═══════════════════════════════════════════════════════════
     LAYOUT: header fino → mapa (flex:1) → panel compacto → statusbar
     ═══════════════════════════════════════════════════════════ -->

<!-- Header fino -->
<header class="ksk-intento-header">
    <a href="{{ url_for('kiosko.rutas', plaza=candidato.plaza, convocatoria=convocatoria.id) }}"
       class="ksk-intento-back" aria-label="Volver a mis recorridos">
        <i class="ph ph-arrow-left"></i>
    </a>
    <div class="ksk-intento-header__info">
        <span class="ksk-intento-header__ruta">{{ ruta.label if ruta else attempt_id }}</span>
        <span class="ksk-intento-header__candidato">{{ candidato.nombre }} · Plaza #{{ candidato.plaza }} · {{ convocatoria.nombre }}</span>
    </div>
</header>

<!-- Mapa ocupa todo el espacio disponible -->
<div class="ksk-intento-map" id="ksk-map">

    <!-- Placeholder mientras carga -->
    <div class="ksk-intento-map__placeholder" id="ksk-map-placeholder">
        <i class="ph ph-compass"></i>
        <span id="ksk-map-msg">Cargando recorrido…</span>
    </div>



</div>

<!-- Panel inferior oculto (sólo visor) -->
<div class="ksk-intento-panel ksk-intento-panel--hidden" style="display:none">

</div>

<!-- Status bar -->
<div class="ksk-statusbar ksk-statusbar--intento">
    <div class="ksk-statusbar__online" id="ksk-status-label">
        <span class="ksk-statusbar__dot" id="ksk-dot"></span>
        <span id="ksk-status-text">EN LÍNEA</span>
    </div>
    <div class="ksk-statusbar__sep"></div>
    <div class="ksk-statusbar__pending ksk-statusbar__pending--hidden" id="ksk-pending">
        <i class="ph ph-cloud-slash"></i>
        <span>0 pendientes</span>
    </div>
    <span class="ksk-statusbar__clock" id="ksk-clock"></span>
</div>

<script>
(function () {
    var GPS_URL = '{% if attempt_id %}{{ url_for("kiosko.intento_gps", attempt_id=attempt_id) }}{% endif %}';

    /* Auto-fullscreen al primer toque */
    document.addEventListener('touchstart', function autoFs() {
        if (!document.fullscreenElement) {
            document.documentElement.requestFullscreen().catch(function(){});
        }
    }, { once: true });

    // ── Clock ─────────────────────────────────────────────────────────
    var clockEl = document.getElementById('ksk-clock');
    function updateClock() {
        var now = new Date();
        clockEl.textContent =
            String(now.getHours()).padStart(2,'0') + ':' +
            String(now.getMinutes()).padStart(2,'0') + ':' +
            String(now.getSeconds()).padStart(2,'0');
    }
    setInterval(updateClock, 1000); updateClock();

    // ── Online / offline ───────────────────────────────────────────────
    var dot = document.getElementById('ksk-dot');
    var statusLabel = document.getElementById('ksk-status-label');
    var statusText = document.getElementById('ksk-status-text');
    var pendingEl = document.getElementById('ksk-pending');

    function updateOnline() {
        var online = navigator.onLine;
        dot.classList.toggle('ksk-statusbar__dot--offline', !online);
        statusLabel.classList.toggle('ksk-statusbar__online--offline', !online);
        statusText.textContent = online ? 'EN LÍNEA' : 'SIN CONEXIÓN';
    }
    window.addEventListener('online', updateOnline);
    window.addEventListener('offline', updateOnline);
    updateOnline();

    // ── IndexedDB badge ────────────────────────────────────────────────
    var DB_NAME = 'ksk_offline', STORE = 'taps', db = null;
    function openDB(cb) {
        if (db) { cb(db); return; }
        var req = indexedDB.open(DB_NAME, 1);
        req.onupgradeneeded = function (e) {
            e.target.result.createObjectStore(STORE, { autoIncrement: true });
        };
        req.onsuccess = function (e) { db = e.target.result; cb(db); };
        req.onerror = function () {};
    }
    function updateBadge() {
        openDB(function (d) {
            var req = d.transaction(STORE, 'readonly').objectStore(STORE).count();
            req.onsuccess = function () {
                var n = req.result;
                if (n > 0) {
                    pendingEl.classList.remove('ksk-statusbar__pending--hidden');
                    pendingEl.querySelector('span').textContent = n + ' pendiente' + (n !== 1 ? 's' : '');
                } else {
                    pendingEl.classList.add('ksk-statusbar__pending--hidden');
                }
            };
        });
    }
    openDB(function () { updateBadge(); });
    setInterval(updateBadge, 5000);

    // ── Toggle incidencias ─────────────────────────────────────────────
    var toggleBtn = document.getElementById('ksk-incidents-toggle');
    var incPanel = document.getElementById('ksk-incidents-panel');
    var caret = document.getElementById('ksk-incidents-caret');
    if (toggleBtn && incPanel) {
        toggleBtn.addEventListener('click', function () {
            var expanded = toggleBtn.getAttribute('aria-expanded') === 'true';
            toggleBtn.setAttribute('aria-expanded', !expanded);
            incPanel.hidden = expanded;
            if (caret) caret.className = expanded ? 'ph ph-caret-up' : 'ph ph-caret-down';
        });
    }

    // ── Mapa Leaflet ───────────────────────────────────────────────────
    window.addEventListener('load', function () {
        if (typeof L === 'undefined') return;

        var placeholder = document.getElementById('ksk-map-placeholder');
        var mapMsg = document.getElementById('ksk-map-msg');

        var map = L.map('ksk-map', {
            zoomControl: true,
            scrollWheelZoom: true,
            attributionControl: false,
        });

        // Dark tile para cabina de camión
        L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
            maxZoom: 19,
        }).addTo(map);

        if (!GPS_URL) {
            if (placeholder) placeholder.style.display = 'none';
            map.setView([40.4168, -3.7038], 13);
            return;
        }

        fetch(GPS_URL)
            .then(function (r) { return r.json(); })
            .then(function (data) {
                var points = data.points || [];

                if (placeholder) placeholder.style.display = 'none';

                if (points.length === 0) {
                    map.setView([40.4168, -3.7038], 13);
                    return;
                }

                var latlngs = points.map(function (p) { return [p.lat, p.lng]; });

                var polyline = L.polyline(latlngs, {
                    color: '#1a56db',
                    weight: 5,
                    opacity: 0.9,
                }).addTo(map);

                // Inicio (verde) y Fin (rojo)
                L.circleMarker(latlngs[0], {
                    radius: 9, color: '#fff', weight: 2,
                    fillColor: '#16a34a', fillOpacity: 1,
                }).bindTooltip('Inicio', { permanent: false }).addTo(map);

                L.circleMarker(latlngs[latlngs.length - 1], {
                    radius: 9, color: '#fff', weight: 2,
                    fillColor: '#dc2626', fillOpacity: 1,
                }).bindTooltip('Fin', { permanent: false }).addTo(map);

                map.fitBounds(polyline.getBounds(), { padding: [32, 32] });
            })
            .catch(function () {
                if (mapMsg) mapMsg.textContent = 'No se pudo cargar el recorrido';
            });
    });
}());
</script>
</body>
</html>
