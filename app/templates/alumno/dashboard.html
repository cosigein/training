{% extends "base.html" %}
{% block title %}Mi Portal — CMadrid Training{% endblock %}

{% block content %}
<div style="max-width:600px; margin:80px auto; text-align:center; padding:0 24px;">
    <div style="font-size:48px; margin-bottom:16px;">🚒</div>
    <h1 style="font-size:24px; font-weight:700; color:#0f172a; margin-bottom:8px;">
        Bienvenido, {{ user.name }}
    </h1>
    <p style="color:#64748b; font-size:15px; margin-bottom:32px;">
        Tu portal de candidato está en construcción.<br>
        Estará disponible en los próximos días.
    </p>
    <a href="{{ url_for('auth.logout') }}"
       style="display:inline-block; padding:10px 24px; background:#0f172a; color:#fff;
              border-radius:8px; text-decoration:none; font-size:14px; font-weight:500;">
        Cerrar sesión
    </a>
</div>
{% endblock %}
