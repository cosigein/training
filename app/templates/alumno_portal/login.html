<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Acceso Candidato — CMadrid Training</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/tokens.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/reset.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/alumno.css') }}">
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
</head>
<body>

<div class="alu-login-bg">
    <div class="alu-login-card">

        <div style="display:flex; align-items:center; gap:12px;">
            <div class="alu-logo__icon" style="width:40px; height:40px; font-size:13px;">CM</div>
            <div>
                <div style="font-family:var(--font-heading); font-size:17px; font-weight:700; color:#1e293b;">
                    CMadrid <span style="color:#0d47a1">Training</span>
                </div>
                <div style="font-size:12px; color:#64748b; margin-top:2px;">Portal del candidato</div>
            </div>
        </div>

        <form class="alu-login-form" action="{{ url_for('alumno.dashboard') }}" method="get">
            <label for="plaza">Número de plaza</label>
            <input type="text"
                   id="plaza"
                   name="plaza"
                   class="alu-form-input"
                   placeholder="001"
                   maxlength="6"
                   autocomplete="off"
                   autofocus>
            <button type="submit" class="alu-form-btn">
                <i class="ph ph-arrow-right"></i>
                Ver mis resultados
            </button>
        </form>

        <div class="alu-login-footer">
            Usa el número de plaza de la convocatoria.<br>
            Los resultados son <strong>provisionales</strong> hasta el cierre oficial.
        </div>

    </div>
</div>

</body>
</html>
