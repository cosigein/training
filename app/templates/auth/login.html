<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login — CMadrid Manager</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/reset.css', q='1') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/tokens.css', q='1') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/manager.css', q='1') }}">
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <style>
        body {
            background-color: #f8fafc;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            font-family: var(--font-base);
        }

        .login-container {
            background: #ffffff;
            width: 100%;
            max-width: 400px;
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
            text-align: center;
        }

        .login-logo {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 64px;
            height: 64px;
            background: #1e3a8a;
            color: #ffffff;
            border-radius: 16px;
            font-size: 32px;
            margin-bottom: 24px;
        }

        .login-title {
            font-family: var(--font-heading);
            font-size: 24px;
            font-weight: 700;
            color: #0f172a;
            margin-bottom: 8px;
        }

        .login-subtitle {
            font-size: 14px;
            color: #64748b;
            margin-bottom: 32px;
        }

        .login-form {
            text-align: left;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-label {
            display: block;
            font-size: 13px;
            font-weight: 600;
            color: #334155;
            margin-bottom: 8px;
        }

        .form-input {
            width: 100%;
            padding: 10px 12px;
            border: 1px solid #cbd5e1;
            border-radius: 6px;
            font-size: 14px;
            transition: border-color var(--transition-fast), box-shadow var(--transition-fast);
        }

        .form-input:focus {
            outline: none;
            border-color: #3b82f6;
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.1);
        }

        .btn-submit {
            display: block;
            width: 100%;
            padding: 12px;
            background: #1e3a8a;
            color: #ffffff;
            border: none;
            border-radius: 6px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: background var(--transition-fast);
        }

        .btn-submit:hover {
            background: #1e40af;
        }

        .login-footer {
            margin-top: 24px;
            font-size: 12px;
            color: #94a3b8;
        }

        .login-divider {
            display: flex;
            align-items: center;
            text-align: center;
            margin: 24px 0;
            color: #94a3b8;
            font-size: 13px;
        }

        .login-divider::before,
        .login-divider::after {
            content: "";
            flex: 1;
            border-bottom: 1px solid #e2e8f0;
        }

        .login-divider:not(:empty)::before {
            margin-right: 12px;
        }

        .login-divider:not(:empty)::after {
            margin-left: 12px;
        }

        .btn-rfid {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            width: 100%;
            padding: 12px;
            background: #f8fafc;
            color: #334155;
            border: 1px dashed #94a3b8;
            border-radius: 6px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all var(--transition-fast);
        }

        .btn-rfid:hover {
            background: #f1f5f9;
            border-color: #3b82f6;
            color: #1e3a8a;
        }

        .btn-rfid i {
            font-size: 24px;
            color: #3b82f6;
        }

        .btn-rfid:disabled {
            cursor: not-allowed;
            opacity: 0.55;
        }

        .btn-rfid:disabled:hover {
            background: #f8fafc;
            border-color: #94a3b8;
            color: #334155;
        }

        .flash-list {
            list-style: none;
            padding: 0;
            margin: 0 0 16px 0;
        }

        .flash-item {
            padding: 10px 12px;
            border-radius: 6px;
            font-size: 13px;
            margin-bottom: 8px;
        }

        .flash-item.danger {
            background: #fef2f2;
            color: #991b1b;
            border: 1px solid #fecaca;
        }

        .flash-item.success {
            background: #f0fdf4;
            color: #166534;
            border: 1px solid #bbf7d0;
        }
    </style>
</head>

<body>

    <div class="login-container">
        <div class="login-logo">
            <i class="ph ph-truck"></i>
        </div>
        <h1 class="login-title">CMadrid Training</h1>
        <p class="login-subtitle">Acceso a la Plataforma</p>

        {% with messages = get_flashed_messages(with_categories=true) %}
        {% if messages %}
        <ul class="flash-list">
            {% for category, message in messages %}
            <li class="flash-item {{ category }}">{{ message }}</li>
            {% endfor %}
        </ul>
        {% endif %}
        {% endwith %}

        <form class="login-form" method="POST" action="{{ url_for('auth.login') }}">
            <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">

            <div class="form-group">
                <label class="form-label" for="email">Correo electrónico</label>
                <input type="email" id="email" name="email" class="form-input" placeholder="usuario@cmadrid.es" required
                    autofocus>
            </div>

            <div class="form-group">
                <label class="form-label" for="password">Contraseña</label>
                <input type="password" id="password" name="password" class="form-input" placeholder="••••••••" required>
            </div>

            <button type="submit" class="btn-submit">Iniciar sesión</button>
        </form>

        <div class="login-divider">O</div>

        <button type="button" class="btn-rfid" disabled title="Próximamente">
            <i class="ph ph-identification-card"></i>
            Acercar tarjeta RFID (próximamente)
        </button>
    </div>

</body>

</html>
