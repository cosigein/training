{% extends "base.html" %}

{% block title %}Acceso denegado — CMadrid Training{% endblock %}

{% block content %}
<div style="display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 60vh; text-align: center;">
    <h1 style="font-size: 8rem; opacity: 0.1; position: absolute; z-index: -1;">403</h1>
    <i class="ph ph-lock-key" style="font-size: 5rem; color: var(--color-primary-500); margin-bottom: var(--space-xl);"></i>
    <h2>No tenés permiso para entrar acá</h2>
    <p style="color: var(--color-text-400); margin-top: var(--space-md); max-width: 400px;">
        Tu rol no incluye acceso a esta sección. Si pensás que tendrías que poder entrar, hablá con tu administrador.
    </p>
    <div style="margin-top: var(--space-2xl);">
        <a href="/" class="btn btn--primary">
            Volver al Inicio
        </a>
    </div>
</div>
{% endblock %}
