{% extends "student/layout.html" %}

{% block extra_css %}
  {{ super() }}
  <link rel="stylesheet" href="{{ url_for('static', filename='css/student.css') }}" >
	<link rel="stylesheet" href="{{ url_for('static', filename='css/components/button.css') }}">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/components/form.css') }}" >
  <link rel="stylesheet" href="{{ url_for('static', filename='css/base.css') }}" >
  <script src="https://unpkg.com/@phosphor-icons/web"></script>

{% endblock %}

{% block title %}Perfil — CMadrid Training{% endblock %}

{% block content %}
<div class="alu-edit-profile-div">
  <form method="POST" action="{{ url_for('student.edit_profile') }}" enctype="multipart/form-data" class="alu-card alu-edit-profile-form">
      <input type="hidden" name="csrf_token" value="{{ csrf_token() }}"/>
      <div class="alu-edit-profile-header">
        <h1 class="alu-edit-profile-header-text"><i class="ph ph-user"></i>Editar perfil</h1>
        <button type="button" onclick="window.location.href=`{{ url_for('student.dashboard') }}`" class="btn--ghost alu-edit-profile-back-btn">Volver<i class="ph ph-arrow-u-down-left"></i></button>
      </div>
      <hr>
      <div class="alu-edit-profile-picture-div">
        <div class="alu-edit-profile-picture-frame">
          <img src="{{ url_for('static', filename='uploads/' ~ current_user.picture) if current_user.picture else '' }}" id="profile-preview" class="alu-edit-profile-picture-preview" />
        </div>
        <span class="alu-edit-profile-picture-preview-text" id="profile-placeholder" style="display: {{ 'none' if current_user.picture else 'block' }};">sin foto de perfil</span>
      </div>
      <div class="alu-edit-profile-picture-btn-div">
        <input style="display: none;" type="file" name="picture" id="picture" accept="image/*" />
        <button type="button" id="change-picture-btn" class="btn--primary alu-edit-profile-picture-btn">Cambiar foto de perfil</button>
      </div>
      <div>
        <label for="name"><strong>Editar nombre:</strong></label>
        <input class="field__input alu-edit-profile-name-input" type="text" name="name" id="name" value="{{ current_user.name }}" />
      </div>
      <p><strong>Email actual:</strong> {{ current_user.email }}</p>
      <button type="submit" class="btn--primary alu-edit-profile-submit-btn">Guardar cambios</button>
  </form>
</div>
{% endblock %}


{% block extra_js %}
<script>
document.addEventListener('DOMContentLoaded', function() {
  const input = document.getElementById('picture');
  const preview = document.getElementById('profile-preview');
  const placeholder = document.getElementById('profile-placeholder');
  const btn = document.getElementById('change-picture-btn');
  if (btn && input) {
    btn.addEventListener('click', function() {
      input.click();
    });
  }
  if (input && preview) {
    input.addEventListener('change', function(event) {
      const [file] = event.target.files;
      if (file) {
        preview.src = URL.createObjectURL(file);
        placeholder.style.display = "none";
      }
    });
  }
});
</script>
{% endblock %}
